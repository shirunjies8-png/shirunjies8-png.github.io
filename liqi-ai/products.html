<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>产品介绍 - 溧企AI</title>
    <meta name="description" content="溧企AI产品介绍页，展示产品图库、设备照片、加工能力和客户案例。" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="wrap topbar-inner">
        <a class="brand" href="index.html"><span class="brand-mark">溧</span><span>溧企AI<small>产品介绍页</small></span></a>
        <nav class="nav" aria-label="主导航">
          <a href="index.html">首页</a>
          <a href="enterprise.html">企业简介</a>
          <a href="quote.html">获取报价</a>
          <a href="contact.html">联系方式</a>
          <a href="admin.html">企业后台</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="wrap hero-grid">
          <div class="panel hero-main">
            <p class="eyebrow">产品介绍</p>
            <h1 data-config="enterprise">溧企AI示例企业</h1>
            <p class="lead">这里集中展示产品照片、机床照片、车间照片和检测设备照片，让客户先看实力，再看联系方式。</p>
            <div class="button-row">
              <a class="btn primary" href="quote.html">上传图纸获取报价</a>
              <a class="btn outline" data-phone-link href="tel:13961109605">电话一键拨号</a>
            </div>
          </div>
          <figure class="panel photo-card">
            <img src="images/product-parts.png" alt="产品照片" />
            <figcaption>产品图库、车间场景、检测照片可以一起展示，方便客户快速判断是否匹配。</figcaption>
          </figure>
        </div>
      </section>

      <section class="section band">
        <div class="wrap grid-4">
          <figure class="panel photo-card">
            <img src="images/cnc-machine.png" alt="CNC加工中心" />
            <figcaption>CNC加工中心</figcaption>
          </figure>
          <figure class="panel photo-card">
            <img src="images/workshop.png" alt="车间照片" />
            <figcaption>车间照片</figcaption>
          </figure>
          <figure class="panel photo-card">
            <img src="images/product-parts.png" alt="产品照片" />
            <figcaption>产品照片</figcaption>
          </figure>
          <figure class="panel photo-card">
            <img src="images/inspection-equipment.png" alt="检测设备照片" />
            <figcaption>检测设备照片</figcaption>
          </figure>
        </div>
      </section>

      <section class="section">
        <div class="wrap grid-2">
          <div class="card">
            <h3>设备能力展示</h3>
            <ul class="plain-list">
              <li>CNC加工中心 × 12</li>
              <li>数控车床 × 8</li>
              <li>激光切割机 × 2</li>
              <li>三坐标检测仪 × 1</li>
            </ul>
          </div>
          <div class="card">
            <h3>服务行业</h3>
            <ul class="plain-list">
              <li>新能源</li>
              <li>汽车零部件</li>
              <li>自动化设备</li>
              <li>医疗设备</li>
              <li>电子产品</li>
            </ul>
          </div>
        </div>
      </section>
    </main>

    <div class="sticky-contact">
      <a class="btn primary" data-phone-link href="tel:13961109605">电话联系</a>
      <button class="btn orange" type="button" data-copy-wechat>微信咨询</button>
    </div>
    <footer class="footer"><div class="wrap">溧企AI · 产品介绍页</div></footer>
    <script src="script.js"></script>
  </body>
</html>
