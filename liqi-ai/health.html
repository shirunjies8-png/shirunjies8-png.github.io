<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 企业健康评分 - 溧企AI</title>
    <meta name="description" content="溧企AI企业健康检测中心，评估官网、SEO、产品展示、招聘和转化能力。" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="wrap topbar-inner">
        <a class="brand" href="index.html"><span class="brand-mark">溧</span><span>溧企AI<small>企业健康评分</small></span></a>
        <nav class="nav" aria-label="主导航">
          <a href="index.html">首页</a>
          <a href="ai-center.html">AI 中心</a>
          <a href="data-center.html">数据中心</a>
          <a href="maintenance.html">网站维护</a>
          <a href="promotion.html">自动推广</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="wrap hero-grid">
          <div class="panel hero-main hero-focus">
            <p class="eyebrow">AI 企业健康评分</p>
            <h1>让 AI 检查企业官网健康度</h1>
            <p class="lead">评估官网评分、网站速度、SEO、产品展示、招聘和转化能力，并给出优化建议。</p>
          </div>
          <div class="panel card">
            <h3>健康评分</h3>
            <div class="dashboard-mini">
              <div class="dash-card"><strong data-count="92">0</strong><span>官网评分</span></div>
              <div class="dash-card"><strong data-count="88">0</strong><span>SEO 评分</span></div>
              <div class="dash-card"><strong data-count="84">0</strong><span>转化评分</span></div>
              <div class="dash-card"><strong data-count="90">0</strong><span>产品展示</span></div>
              <div class="dash-card"><strong data-count="76">0</strong><span>招聘评分</span></div>
              <div class="dash-card"><strong data-count="94">0</strong><span>网站速度</span></div>
            </div>
          </div>
        </div>
      </section>

      <section class="section band">
        <div class="wrap grid-2">
          <div class="card">
            <h3>AI 优化建议</h3>
            <ul class="check-list">
              <li>建议增加案例</li>
              <li>建议增加产品图片</li>
              <li>建议更新新闻</li>
              <li>建议优化标题</li>
              <li>建议增加联系方式</li>
            </ul>
          </div>
          <div class="card">
            <h3>检测项目</h3>
            <ul class="plain-list">
              <li>官网评分</li>
              <li>网站速度评分</li>
              <li>SEO 评分</li>
              <li>产品展示评分</li>
              <li>招聘评分</li>
              <li>客户转化评分</li>
            </ul>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer"><div class="wrap">溧企AI · 企业健康评分</div></footer>
    <script src="script.js"></script>
  </body>
</html>
