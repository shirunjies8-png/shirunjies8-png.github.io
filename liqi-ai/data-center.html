<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 数据中心 - 溧企AI</title>
    <meta name="description" content="溧企AI数据中心，展示访问量、询盘、客户和成交数据。" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="wrap topbar-inner">
        <a class="brand" href="index.html"><span class="brand-mark">溧</span><span>溧企AI<small>AI 数据中心</small></span></a>
        <nav class="nav" aria-label="主导航">
          <a href="index.html">首页</a>
          <a href="ai-center.html">AI 生成</a>
          <a href="assistant.html">AI 客服</a>
          <a href="maintenance.html">网站维护</a>
          <a href="promotion.html">自动推广</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="wrap hero-grid">
          <div class="panel hero-main hero-focus">
            <p class="eyebrow">AI 数据中心</p>
            <h1>今日访问、询盘、成交一眼看清</h1>
            <p class="lead">实时统计今日访问人数、浏览量、AI 回复数量、询盘和推荐结果，帮助老板判断网站有没有在工作。</p>
          </div>
          <div class="panel card">
            <div class="dashboard-mini">
              <div class="dash-card"><strong data-count="286">0</strong><span>今日访问人数</span></div>
              <div class="dash-card"><strong data-count="1220">0</strong><span>今日浏览量</span></div>
              <div class="dash-card"><strong data-count="18">0</strong><span>AI 回复数量</span></div>
              <div class="dash-card"><strong data-count="12">0</strong><span>新增询盘</span></div>
              <div class="dash-card"><strong data-count="8">0</strong><span>新增客户</span></div>
              <div class="dash-card"><strong data-count="3">0</strong><span>成交客户</span></div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <footer class="footer"><div class="wrap">溧企AI · AI 数据中心</div></footer>
    <script src="script.js"></script>
  </body>
</html>
